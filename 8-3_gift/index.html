    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.136.0/build/three.module.js",

    <script type="module">
        import *as THREE from "three"; import { OrbitControls } from "three/controls";
        let init = false;
        window.initUniverse = function () {
            if (init) return; init = true;
            const c = document.getElementById("universe"); c.classList.add("show"); document.body.style.overflow = "hidden";
            const msgs = window.UNIVERSE_MSGS || ["Happy Women's Day"];

            function gtp(t, n) {
                const cv = document.createElement("canvas"), cx = cv.getContext("2d"); cv.width = 1200; cv.height = 200;
                cx.fillStyle = "white"; cx.font = "bold 80px Arial"; cx.textAlign = "center"; cx.textBaseline = "middle"; cx.fillText(t, 600, 100);
                const tw = cx.measureText(t).width, a = innerWidth / innerHeight, vw = 2 * Math.tan(Math.PI * 60 / 360) * 30 * a, s = Math.min(.08, vw * .8 / tw);
                const d = cx.getImageData(0, 0, 1200, 200).data, p = [];
                for (let y = 0; y < 200; y += 2)for (let x = 0; x < 1200; x += 2)if (d[(y * 1200 + x) * 4 + 3] > 128) p.push(new THREE.Vector3((x - 600) * s, (100 - y) * s, 0));
                const r = new Float32Array(n * 3); for (let i = 0; i < n; i++) { const q = p[i % p.length]; r[i * 3] = q.x; r[i * 3 + 1] = q.y; r[i * 3 + 2] = q.z } return r;
            }

            let sc = new THREE.Scene(); sc.background = new THREE.Color('#160016');
            let cam = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 1, 1000); cam.position.set(0, 4, 30);
            let ren = new THREE.WebGLRenderer({ antialias: true }); ren.setSize(innerWidth, innerHeight); c.appendChild(ren.domElement);
            addEventListener("resize", () => { cam.aspect = innerWidth / innerHeight; cam.updateProjectionMatrix(); ren.setSize(innerWidth, innerHeight) });
            let ctrl = new OrbitControls(cam, ren.domElement); ctrl.enableDamping = true; ctrl.enablePan = false;

            let gu = { time: { value: 0 }, textMix: { value: 0 }, finalMix: { value: 0 }, initialMix: { value: 0 } };
            const N = 150000, mp = msgs.map(m => gtp(m, N));
            let pts = [], sz = [], sh = [], sp = [];
            for (let i = 0; i < N; i++) {
                let gp; if (i < 50000) gp = new THREE.Vector3().randomDirection().multiplyScalar(Math.random() * .5 + 9.5);
                else { let r = Math.pow(Math.random(), 1.5), rad = Math.sqrt(1600 * r + (1 - r) * 100); gp = new THREE.Vector3().setFromCylindricalCoords(rad, Math.random() * 2 * Math.PI, (Math.random() - .5) * 2) }
                pts.push(gp); sz.push(Math.random() * 1.5 + .5);
                sh.push(Math.random() * Math.PI, Math.random() * Math.PI * 2, (Math.random() * .9 + .1) * Math.PI * .1, Math.random() * .9 + .1);
                sp.push((Math.random() - .5) * 80, (Math.random() - .5) * 80, (Math.random() - .5) * 80);
            }
            let g = new THREE.BufferGeometry().setFromPoints(pts);
            g.setAttribute("sizes", new THREE.Float32BufferAttribute(sz, 1)); g.setAttribute("shift", new THREE.Float32BufferAttribute(sh, 4));
            g.setAttribute("scatterPos", new THREE.Float32BufferAttribute(sp, 3));
            g.setAttribute("startText", new THREE.Float32BufferAttribute(mp[0], 3)); g.setAttribute("endText", new THREE.Float32BufferAttribute(mp[0], 3));

            let m = new THREE.PointsMaterial({
                size: .125, transparent: true, depthTest: false, blending: THREE.AdditiveBlending,
                onBeforeCompile: s => {
                    s.uniforms.time = gu.time; s.uniforms.textMix = gu.textMix; s.uniforms.finalMix = gu.finalMix; s.uniforms.initialMix = gu.initialMix;
                    s.vertexShader = `uniform float time;uniform float textMix;uniform float finalMix;uniform float initialMix;attribute float sizes;attribute vec4 shift;attribute vec3 startText;attribute vec3 endText;attribute vec3 scatterPos;varying vec3 vColor;${s.vertexShader}`.replace('gl_PointSize = size;', 'gl_PointSize = size * sizes;').replace('#include <color_vertex>', `#include <color_vertex>\nfloat d=length(abs(position)/vec3(40.,10.,40));d=clamp(d,0.,1.);vColor=mix(vec3(42,40,154),vec3(209,124,196),d)/255.;`).replace('#include <begin_vertex>', `#include <begin_vertex>\nfloat t=time;float moveT=mod(shift.x+shift.z*t,PI2);float moveS=mod(shift.y+shift.z*t,PI2);vec3 ctp=mix(startText,endText,textMix);vec3 gp2=mix(scatterPos,ctp,initialMix);vec3 fp=mix(gp2,position,finalMix);vec3 noise=vec3(cos(moveS)*sin(moveT),cos(moveT),sin(moveS)*sin(moveT))*shift.a;transformed=fp+noise*(finalMix+(1.0-initialMix)*0.5);`);
                    s.fragmentShader = `varying vec3 vColor;${s.fragmentShader}`.replace('#include <clipping_planes_fragment>', '#include <clipping_planes_fragment>\nfloat d=length(gl_PointCoord.xy-0.5);if(d>0.5)discard;').replace('vec4 diffuseColor = vec4( diffuse, opacity );', 'vec4 diffuseColor = vec4( vColor, smoothstep(0.5, 0.1, d) );');
                }
            });
            let p = new THREE.Points(g, m); p.rotation.order = "ZYX"; sc.add(p);

            let clk = new THREE.Clock(), mi = 0, st = "GATHERING", sT = 0;
            ren.setAnimationLoop(() => {
                ctrl.update(); let dt = clk.getDelta(), t = clk.getElapsedTime() * .5; gu.time.value = t * Math.PI; sT += dt;
                if (st === "GATHERING") { let pr = sT / 3; if (pr >= 1) { pr = 1; st = "DISPLAYING"; sT = 0 } gu.initialMix.value = pr }
                else if (st === "DISPLAYING") { gu.initialMix.value = 1; if (sT > 2.5) { st = "SWITCHING"; sT = 0; mi++; if (mi < msgs.length) { g.attributes.endText.array.set(mp[mi]); g.attributes.endText.needsUpdate = true } else st = "GALAXY" } }
                else if (st === "SWITCHING") { let pr = sT / 1.5; if (pr >= 1) { gu.textMix.value = 0; g.attributes.startText.array.set(mp[mi]); g.attributes.startText.needsUpdate = true; st = "DISPLAYING"; sT = 0 } else gu.textMix.value = pr }
                else if (st === "GALAXY") { let pr = sT / 5; gu.finalMix.value = Math.min(1, pr); p.rotation.y = t * .05 * gu.finalMix.value; p.rotation.z = .2 * gu.finalMix.value }
                ren.render(sc, cam);
            });
        };

        /* ========= MAGICAL GARDEN JS ========= */
        window.addEventListener('load', () => {
            const c = setTimeout(() => {
                document.body.classList.remove("not-loaded");
                clearTimeout(c);
            }, 1000);
        });
    </script>
</body>
